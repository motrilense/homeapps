<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Text List</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; font-size: 16px; }
        button { padding: 8px 16px; font-size: 16px; cursor: pointer; }
        ul { padding-left: 20px; }
        li { margin: 5px 0; }
    </style>
</head>
<body>

    <h2>Text List Organizer</h2>
    
    <div class="input-group">
        <input type="text" id="textInput" placeholder="Type something..." oninput="toggleButton()">
        <button id="submitBtn" onclick="submitText()" disabled>Add Text</button>
    </div>

    <h3>Alphabetical Entries</h3>
    <ul id="entriesList"></ul>

    <script>
        const input = document.getElementById('textInput');
        const button = document.getElementById('submitBtn');
        const list = document.getElementById('entriesList');

        // Enable button only if text is present
        function toggleButton() {
            button.disabled = input.value.trim() === '';
        }

        // Fetch and display sorted entries from the backend
        async function loadEntries() {
            try {
                const response = await fetch('/api/entries');
                const entries = await response.json();
                list.innerHTML = entries.map(item => `<li>${item}</li>`).join('');
            } catch (error) {
                console.error('Error fetching entries:', error);
            }
        }

        // Send new text to the backend
        async function submitText() {
            const textValue = input.value.trim();
            if (!textValue) return;

            try {
                const response = await fetch('/api/entries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textValue })
                });

                if (response.ok) {
                    input.value = '';
                    toggleButton();
                    loadEntries();
                }
            } catch (error) {
                console.error('Error saving entry:', error);
            }
        }

        // Initial load when page opens
        loadEntries();
    </script>
</body>
</html>
